# Main CI Workflow
#
# Runs on all pushes and pull requests to main/develop.
# Executes tests, type checking, and linting.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ gitea.head_ref || gitea.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container: node:20
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # --omit=optional skips sharp (can't download binary from GitHub in CI).
          # Re-install @rollup/rollup-linux-x64-gnu separately — it's also optional
          # but is a registry package (no GitHub download) and is required by vitest.
          # --ignore-scripts on the second pass prevents sharp from being re-triggered.
          npm ci --omit=optional
          ROLLUP_VER=$(node -e "console.log(require('./node_modules/rollup/package.json').version)")
          npm install --no-save --omit=optional --ignore-scripts "@rollup/rollup-linux-x64-gnu@${ROLLUP_VER}"

      - name: Run type check
        run: npm run typecheck

      - name: Build CLI (required by integration tests that spawn bin/aiwg.mjs)
        run: npm run build:cli

      - name: Run tests
        run: npm run test:ci

  build:
    name: Build
    runs-on: ubuntu-latest
    container: node:20
    timeout-minutes: 10
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          npm ci --omit=optional
          ROLLUP_VER=$(node -e "console.log(require('./node_modules/rollup/package.json').version)")
          npm install --no-save --omit=optional --ignore-scripts "@rollup/rollup-linux-x64-gnu@${ROLLUP_VER}"

      - name: Build TypeScript
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking build output..."
          ls -la dist/ || echo "dist/ directory not found"
          ls -la dist/src/ || echo "dist/src/ directory not found"

      - name: Verify .aiwg/ excluded from build
        run: |
          if [ -d "dist/.aiwg" ] || find dist/ -path '*/.aiwg/*' 2>/dev/null | grep -q .; then
            echo "FATAL: .aiwg/ content found in build output!"
            exit 1
          fi
          echo "✓ .aiwg/ correctly excluded from build output"
