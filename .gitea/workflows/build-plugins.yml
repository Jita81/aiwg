# Build and Package Plugins
#
# Packages Claude Code plugins on tag push or manual dispatch.
# Note: npm publishing happens via GitHub Actions (requires npm provenance).

name: Build Plugins

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      clean:
        description: 'Clean plugins directory before building'
        required: false
        default: true
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Package Plugins
    runs-on: ubuntu-latest
    container: node:20
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Package plugins
        run: |
          if [ "${{ github.event.inputs.clean }}" = "true" ] || [ "${{ github.event_name }}" = "push" ]; then
            npm run package-plugins:clean
          else
            npm run package-plugins
          fi

      - name: Validate plugin manifests
        run: |
          echo "Validating plugin manifests..."
          # Codex plugins are registered via .agents/plugins/marketplace.json
          # instead of per-plugin .claude-plugin/plugin.json. Accept either.
          CODEX_MARKETPLACE=".agents/plugins/marketplace.json"
          for plugin in plugins/*/; do
            name=$(basename "$plugin")
            if [ -f "$plugin.claude-plugin/plugin.json" ]; then
              echo "✓ $name: claude manifest valid"
              cat "$plugin.claude-plugin/plugin.json" | head -5
            elif [ -f "$plugin.codex-plugin/plugin.json" ]; then
              echo "✓ $name: codex manifest valid"
              cat "$plugin.codex-plugin/plugin.json" | head -5
            elif [ -f "$CODEX_MARKETPLACE" ] && grep -Eq "\"name\"[[:space:]]*:[[:space:]]*\"$name\"" "$CODEX_MARKETPLACE"; then
              echo "✓ $name: registered in codex marketplace"
            else
              echo "✗ $name: missing manifest (no .claude-plugin/plugin.json, .codex-plugin/plugin.json, or codex marketplace entry)"
              exit 1
            fi
          done

      - name: Validate marketplace.json
        run: |
          echo "Validating marketplace.json..."
          if [ -f ".claude-plugin/marketplace.json" ]; then
            echo "✓ marketplace.json exists at .claude-plugin/"
            cat ".claude-plugin/marketplace.json" | head -20
          elif [ -f "marketplace.json" ]; then
            echo "✓ marketplace.json exists at repo root"
            cat "marketplace.json" | head -20
          elif [ -f "plugins/.claude-plugin/marketplace.json" ]; then
            echo "✓ marketplace.json exists in plugins/"
            cat "plugins/.claude-plugin/marketplace.json" | head -20
          else
            echo "✗ marketplace.json missing"
            exit 1
          fi

      - name: Verify .aiwg/ excluded from plugins
        run: |
          FOUND=0
          for plugin in plugins/*/; do
            if find "$plugin" -path '*/.aiwg/*' 2>/dev/null | grep -q .; then
              echo "FATAL: .aiwg/ content found in plugin $(basename $plugin)!"
              find "$plugin" -path '*/.aiwg/*'
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo ".aiwg/ is project-local SDLC artifacts — must never be in plugins."
            exit 1
          fi
          echo "✓ .aiwg/ correctly excluded from all plugins"

      - name: Build summary
        run: |
          echo "## Plugin Build Complete"
          echo ""
          echo "### Built Plugins:"
          for plugin in plugins/*/; do
            if [ -d "$plugin" ]; then
              echo "- $(basename $plugin)"
            fi
          done
          echo ""
          echo "**Note**: npm publishing happens via GitHub Actions."

  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    container: node:20
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Build CLI (required by integration tests that spawn bin/aiwg.mjs)
        run: npm run build:cli

      - name: Run tests
        env:
          # CI runs in docker-in-docker on the Gitea runner — cold start is
          # ~50ms slower than a bare-metal laptop. Matches ci.yml budgets.
          AIWG_PERF_BUDGET_VERSION_MS: "300"
          AIWG_PERF_BUDGET_HELP_MS: "500"
        run: npm test -- --run
