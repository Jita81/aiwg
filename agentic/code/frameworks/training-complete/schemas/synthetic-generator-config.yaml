# ============================================================================
# Schema: synthetic-generator-config
# Namespace: training-complete
# Consumer: synthetic-data-generator skill
# References: REF-435, REF-436, REF-445, REF-446, REF-448, REF-456, REF-470
#             ADR-022 D10 (Model Collapse recursion policy)
# ============================================================================
# This schema defines the configuration contract for the synthetic-data-generator
# skill. A config file conforming to this schema is the authoritative, reproducible
# declaration of a synthetic generation job.
#
# Committed config files SHOULD live under:
#   .aiwg/training/synthesis/configs/<job-name>.yaml
# ============================================================================

$schema: "http://json-schema.org/draft-07/schema#"
schema_version: "1.0.0"
title: SyntheticGeneratorConfig

type: object
required: [generator, count, output_path]
additionalProperties: false

properties:

  # -- PATTERN SELECTION --------------------------------------------------------
  generator:
    type: string
    description: Published synthesis pattern to apply. See SKILL.md for citations.
    enum:
      - orca
      - orca-2
      - phi
      - personahub
      - star
      - rest

  # -- MODEL CONFIG (for distillation patterns) --------------------------------
  model:
    type: object
    description: Model configuration. Required for orca, orca-2, star, rest; optional for phi, personahub.
    properties:
      teacher:
        type: string
        description: Teacher model ID (larger model providing distillation signal).
      student:
        type: string
        description: Optional student model ID (used for filtering / reward scoring).
      provider:
        type: string
        enum: [anthropic, openai, local, other]

  # -- GENERATION VOLUME --------------------------------------------------------
  count:
    type: integer
    minimum: 1
    description: Target number of accepted examples. Generation continues until this count or budget exhaustion.

  batch_size:
    type: integer
    minimum: 1
    default: 32
    description: Per-call batch size for API efficiency. Lower on rate-limited providers.

  # -- SEED SOURCING ------------------------------------------------------------
  seed_source:
    type: string
    description: Glob matching seed examples. Required for star, rest; optional for orca/personahub; ignored for phi.

  # -- QUALITY GATE -------------------------------------------------------------
  quality_threshold:
    type: string
    enum: [HIGH, MODERATE, LOW]
    default: MODERATE
    description: Minimum quality grade per example (delegated to example-quality-assess). Batch-level median below this triggers a WARNING.

  # -- DIVERSITY KNOBS ----------------------------------------------------------
  diversity_settings:
    type: object
    description: Pattern-specific diversity controls.
    properties:
      persona_count:
        type: integer
        minimum: 1
        description: For personahub — number of personas to sample per batch.
      persona_pool_path:
        type: string
        description: Path to persona definitions file. If omitted, uses inline personas field.
      evol_depth:
        type: integer
        minimum: 1
        maximum: 5
        description: For evol-instruct-style depth evolution (orca-2, rest).
      evol_breadth:
        type: integer
        minimum: 1
        maximum: 5
        description: For evol-instruct-style breadth evolution (orca-2, rest).
      topic_outline_path:
        type: string
        description: For phi — path to topic outline driving curriculum generation.

  # -- OUTPUT -------------------------------------------------------------------
  output_path:
    type: string
    description: Output location. MUST be under derivedPages.synthesizedExamples per topology contract.
    default: "examples/synthesized/<job-name>/"

  # -- SAMPLING KNOBS -----------------------------------------------------------
  temperature:
    type: number
    minimum: 0.0
    maximum: 2.0
    default: 0.7
  top_p:
    type: number
    minimum: 0.0
    maximum: 1.0
    default: 0.95
  max_tokens:
    type: integer
    minimum: 1
    default: 2048

  # -- VALIDATION RULES ---------------------------------------------------------
  validation_rules:
    type: object
    description: Per-example structural validators applied before quality assessment.
    properties:
      min_length:
        type: integer
        minimum: 1
        default: 32
      max_length:
        type: integer
        minimum: 1
        default: 8192
      language_detect:
        type: string
        description: Expected language code (e.g., "en"). Examples detected as other languages are rejected.
      require_reasoning_trace:
        type: boolean
        default: false
        description: For star, rest — require output.reasoning_trace to be non-empty.
      forbid_pii:
        type: boolean
        default: true
        description: Reject examples that trip a PII detector.

# ============================================================================
# WORKED EXAMPLES
# ============================================================================

examples:

  # ---- ORCA: teacher-model distillation --------------------------------------
  - generator: orca
    model:
      teacher: "claude-opus-4-6"
      provider: anthropic
    count: 10000
    batch_size: 32
    seed_source: "examples/raw/task-prompts-*"
    quality_threshold: MODERATE
    output_path: "examples/synthesized/orca-bootstrap/"
    temperature: 0.7
    max_tokens: 4096
    validation_rules:
      min_length: 64
      require_reasoning_trace: true

  # ---- PHI: textbook-quality curriculum (no seeds) ---------------------------
  - generator: phi
    model:
      teacher: "claude-opus-4-6"
      provider: anthropic
    count: 5000
    batch_size: 16
    quality_threshold: HIGH
    diversity_settings:
      topic_outline_path: "synthesis/phi-curriculum-outline.yaml"
    output_path: "examples/synthesized/phi-curriculum/"
    temperature: 0.3
    max_tokens: 2048
    validation_rules:
      min_length: 128
      max_length: 4096
      language_detect: "en"

  # ---- PERSONAHUB: persona-driven instruction diversity ----------------------
  - generator: personahub
    model:
      teacher: "claude-opus-4-6"
      provider: anthropic
    count: 20000
    batch_size: 64
    quality_threshold: MODERATE
    diversity_settings:
      persona_count: 1000
      persona_pool_path: "synthesis/personas/hub-v1.yaml"
    output_path: "examples/synthesized/personahub-v1/"
    temperature: 0.9
    top_p: 0.95
