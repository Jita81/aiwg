# decontamination-targets.yaml
# Schema + default benchmark target set for decontamination-check (#842).
#
# Purpose:
#   Declares the benchmark evaluation sets that training datasets must be
#   checked against for overlap before publication (ADR-022 D8).
#
# Usage:
#   - Defaults shipped here are always active.
#   - User-declared targets are UNIONED with defaults by default.
#   - To replace rather than extend, set `override_defaults: true` at the top level.
#
# Shared schema:
#   The `matric-eval` project (#849) consumes this same schema so that
#   "what we check for leakage" and "what we evaluate against" stay aligned.
#
# References: ADR-022 D8, REF-442, REF-449, REF-450

schema_version: "1.0"
schema_id: "training-complete/decontamination-targets"

# Set to true to ignore the shipped defaults and use only user-declared targets.
override_defaults: false

# Global defaults (per-target entries may override).
defaults:
  ngram_size: 13        # REF-442 convention
  threshold: 0          # zero tolerance
  detection_modes: [exact-ngram]
  normalize:
    lowercase: true
    collapse_whitespace: true
    strip_punctuation: false

# Shipped default target set.
targets:
  - id: MMLU
    name: "Massive Multitask Language Understanding"
    source: "Hendrycks et al. 2021"
    eval_set_path: "hf://cais/mmlu"
    ngram_size: 13
    threshold: 0
    detection_modes: [exact-ngram, fuzzy]

  - id: GSM8K
    name: "Grade School Math 8K"
    source: "Cobbe et al. 2021"
    eval_set_path: "hf://gsm8k"
    ngram_size: 13
    threshold: 0
    detection_modes: [exact-ngram, fuzzy]

  - id: HumanEval
    name: "HumanEval code synthesis benchmark"
    source: "Chen et al. 2021"
    eval_set_path: "hf://openai_humaneval"
    ngram_size: 8         # shorter n-grams for code
    threshold: 0
    detection_modes: [exact-ngram]

  - id: HELM
    name: "Holistic Evaluation of Language Models"
    source: "Liang et al. 2022"
    eval_set_path: "hf://stanford-crfm/helm"
    ngram_size: 13
    threshold: 0
    detection_modes: [exact-ngram, semantic]

  - id: MT-Bench
    name: "Multi-turn chat benchmark"
    source: "Zheng et al. 2023"
    eval_set_path: "hf://lmsys/mt_bench_human_judgments"
    ngram_size: 13
    threshold: 0
    detection_modes: [exact-ngram, semantic]  # paraphrase-prone

  - id: AlpacaEval
    name: "AlpacaEval instruction-following leaderboard"
    source: "REF-450"
    eval_set_path: "hf://tatsu-lab/alpaca_eval"
    ngram_size: 13
    threshold: 0
    detection_modes: [exact-ngram, semantic]

# Semantic detection configuration (applied when `semantic` mode is active).
semantic:
  embedding_model: "text-embedding-3-small"
  cosine_threshold: 0.95
  batch_size: 256
  random_seed: 42

# --- User overrides / extensions ---
#
# To add a custom target, append a new entry under `user_targets:` below.
# Example:
#
# user_targets:
#   - id: MyInternalBench
#     name: "Internal Q1 eval suite"
#     source: "internal"
#     eval_set_path: "./eval-sets/q1-internal/"
#     ngram_size: 13
#     threshold: 0
#     detection_modes: [exact-ngram, fuzzy]
#
# User targets are unioned with `targets:` above unless `override_defaults: true`.

user_targets: []
