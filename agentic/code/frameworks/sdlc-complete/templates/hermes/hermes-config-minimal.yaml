# Hermes Agent + AIWG — Minimal MCP Configuration
#
# This config connects AIWG as an MCP sidecar with a restricted tool surface.
# Schema overhead: ~3,000 tokens (vs. ~12,000+ with full surface).
#
# Architecture: Hermes (host) → MCP → AIWG (sidecar)
# Hermes owns: conversation, memory, sessions
# AIWG owns: .aiwg/ artifacts, workflows, templates
#
# Usage:
#   1. Copy the mcp_servers block into ~/.hermes/config.yaml
#   2. Restart Hermes or reload MCP servers
#   3. Verify: ask Hermes "what AIWG tools are available?"

mcp_servers:
  aiwg:
    command: "aiwg"
    args: ["mcp", "serve"]
    tools:
      include:
        - workflow-run       # Execute AIWG workflow by name
        - artifact-read      # Read a specific .aiwg/ artifact
        - artifact-write     # Write/update a .aiwg/ artifact
        - template-render    # Render an AIWG template with data
        - agent-list         # List available AIWG agents
      prompts: false         # Suppress prompt schemas (saves tokens)
      resources: false       # Suppress resource schemas (saves tokens)

# Recommended model strategy — two roles, two models:
#
#   Parent (conversation, soul, memory):
#     hermes3          — best for roleplay/soul features (recommended)
#     mistral:7b       — solid general-purpose alternative
#     llama3.2:3b      — lightweight, fast on low VRAM
#
#   Coding / tool calls (via delegate_task model override):
#     qwen3.5:9b       — best tool call accuracy of any open-weight model (recommended)
#     qwen2.5-coder:7b — smaller Qwen variant, still excellent tool calls
#     phi4-mini        — compact alternative for low VRAM
#
#   Note: Qwen models have the best tool call accuracy open-weight. Use them
#   for any AIWG workflow involving structured output or function calling.
#
# Pull recommended pair: ollama pull hermes3 && ollama pull qwen3.5:9b

# Compression settings for local hardware (12GB VRAM)
compression:
  enabled: true
  threshold: 0.30              # Lower than default 0.50 — avoids abrupt context cliffs
  summary_model: "ollama/qwen3.5:9b"
  summary_provider: "custom"
  summary_base_url: "http://localhost:11434/v1"

# Context window (auto-detected from /models endpoint, or set manually)
# model:
#   context_length: 32768

max_tool_rounds: 10
