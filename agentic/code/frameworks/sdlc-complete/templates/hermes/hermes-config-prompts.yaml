# Hermes Agent + AIWG — Advanced MCP Configuration (with prompts)
#
# Use this ONLY after the minimal config is stable and working.
# Enabling prompts exposes AIWG workflow prompts as callable templates.
# This adds schema overhead — only enable when the extra capability is needed.
#
# Prerequisites:
#   1. hermes-config-minimal.yaml is working
#   2. You have verified artifact-read/write and workflow-run
#   3. You understand the token cost of prompt schemas

mcp_servers:
  aiwg:
    command: "aiwg"
    args: ["mcp", "serve"]
    tools:
      include:
        - workflow-run
        - artifact-read
        - artifact-write
        - template-render
        - agent-list
      prompts: true          # Enable AIWG prompt exposure
      resources: false       # Resources still suppressed (use artifact-read instead)

# Same compression settings as minimal config
compression:
  enabled: true
  threshold: 0.30
  summary_model: "ollama/qwen3.5:9b"
  summary_provider: "custom"
  summary_base_url: "http://localhost:11434/v1"

max_tool_rounds: 10
